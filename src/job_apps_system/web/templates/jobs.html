  <body>
    <div class="app-shell">

      <!-- Sidebar -->

        <div class="sidebar-brand">

        </div>

        <nav class="sidebar-nav">
          <div class="sidebar-nav-label">Workspace</div>
          <a href="/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="1.5" y="1.5" width="5" height="5" rx="1" />
              <rect x="9.5" y="1.5" width="5" height="5" rx="1" />
              <rect x="1.5" y="9.5" width="5" height="5" rx="1" />
              <rect x="9.5" y="9.5" width="5" height="5" rx="1" />
            </svg>
            Dashboard
          </a>
          <a href="/jobs/" class="active">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 2.5h5l2 3v7a1 1 0 0 1-1 1h-7a1 1 0 0 1-1-1v-7l2-3z" />
              <path d="M3.5 5.5h9" />
            </svg>
            Jobs
          </a>
          <a href="/scoring/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 1.5v13M1.5 8h13" />
              <path d="M4 4l8 8M12 4l-8 8" />
            </svg>
            Scoring
          </a>
          <a href="/interviews/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2.5 3.5h11v9h-11z" />
              <path d="M5.5 3.5v-2M10.5 3.5v-2M2.5 7h11" />
            </svg>
            Interviews
          </a>

          <div class="sidebar-nav-label">System</div>
          <a href="/setup/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="8" r="2.5" />
              <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4" />
            </svg>
            Setup
          </a>
          <a href="/runs/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="8" r="6" />
              <path d="M8 4.5v4l2.5 1.5" />
            </svg>
            Run History
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="env-badge">
            <span class="env-dot"></span>
            development
          </div>
        </div>
      </aside>

      <!-- Main -->
      <main class="main-content main-content--wide">
        <header class="page-header animate-in">
          <h2>Jobs</h2>
          <p>Browse, search, and edit your tracked job applications.</p>
        </header>

        <section class="section animate-in">
          <div class="jobs-toolbar">
            <div class="jobs-toolbar-left">
              <input
                type="text"
                id="jobs-search"
                class="jobs-search-input"
                placeholder="Search company or title..."
                autocomplete="off"
              />
              <span id="jobs-count" class="jobs-count">0 jobs</span>
            </div>
            <div class="jobs-toolbar-right">
              <button type="button" id="jobs-refresh" class="btn-sm">Refresh</button>
            </div>
          </div>

          <div class="jobs-table-wrap">
            <table class="jobs-table">
              <thead>
                <tr>
                  <th class="col-applied">Applied</th>
                  <th class="col-resume-url">Resume URL</th>
                  <th class="col-posted">Posted</th>
                  <th class="col-score">Score</th>
                  <th class="col-company">Company</th>
                  <th class="col-title">Job Title</th>
                  <th class="col-description">Job Description</th>
                  <th class="col-apply-url">Apply URL</th>
                  <th class="col-company-url">Company URL</th>
                  <th class="col-posting-url">Job Posting URL</th>
                  <th class="col-created">Created</th>
                </tr>
              </thead>
              <tbody id="jobs-table-body">
                <tr>
                  <td colspan="11" class="empty-state"><p>Loading...</p></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>

    </div>

    <script src="/static/jobs.js?v=20260409-jobs-runtime"></script>
  </body>
</html>
