<header class="app-topbar">
  <div class="app-topbar-inner">
    <a href="/" class="app-brand-mark">AI Job Agents</a>

    <nav class="app-tab-nav" aria-label="Primary">
      <a href="/" class="app-tab{% if active_tab == 'dashboard' %} active{% endif %}">Dashboard</a>
      <a href="/jobs/all/" class="app-tab{% if active_tab == 'find_jobs' %} active{% endif %}">Find Jobs</a>
      <a href="/jobs/" class="app-tab{% if active_tab == 'best_job_matches' %} active{% endif %}">Best Job Matches</a>
      <a href="/applications/" class="app-tab{% if active_tab == 'applications' %} active{% endif %}">Applications</a>
      <a href="/interviews/" class="app-tab{% if active_tab == 'emails_interviews' %} active{% endif %}">Emails/Interviews</a>
    </nav>

    <a href="/setup/" class="app-utility-link{% if active_tab == 'setup' %} active{% endif %}">Setup</a>
  </div>
</header>

<div id="stale-run-modal" class="modal-backdrop" hidden>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="stale-run-modal-title">
    <div class="modal-header">
      <h3 id="stale-run-modal-title">Previous Run Found</h3>
    </div>
    <p id="stale-run-modal-message" class="modal-message"></p>
    <div id="stale-run-modal-status" class="status-box" data-level="info" hidden></div>
    <div class="modal-actions">
      <button type="button" id="stale-run-cancel-button" class="btn-sm">No, Cancel</button>
      <button type="button" id="stale-run-continue-button" class="btn-primary">Yes, Continue</button>
    </div>
  </div>
</div>

<script src="{{ static_url('stale-run-recovery.js') }}"></script>
