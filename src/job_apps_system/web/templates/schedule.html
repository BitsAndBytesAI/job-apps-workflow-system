<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schedule - AI Job Agents</title>
    <script>(function(){var m=document.cookie.match(/(?:^|; )app-font-size=(\d+)/);if(m)document.documentElement.style.fontSize=m[1]+'px'})();</script>
    <link rel="stylesheet" href="/static/app.css?v=20260428-card-shuffle-v2" />
    <style>
      .schedule-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(22rem, 1fr));
        gap: var(--space-4);
      }
      .schedule-card {
        border: none;
        border-radius: var(--r-card);
        background: var(--color-surface);
        padding: var(--space-6) var(--space-6);
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }
      .schedule-card h3 {
        margin: 0;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 1.625rem;
        font-weight: 300;
        letter-spacing: -0.015em;
        color: var(--color-ink);
      }
      .schedule-meta {
        color: var(--color-ink-faint);
        font-size: var(--type-body-sm);
        font-weight: 300;
      }
      .schedule-days {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-top: var(--space-2);
      }
      .schedule-day {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.375rem 0.875rem;
        border-radius: var(--r-pill);
        background: var(--color-accent-tint);
        border: none;
        font-size: var(--type-meta);
        font-weight: 500;
        color: var(--color-accent-deep);
      }
      .schedule-actions {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-top: var(--space-3);
        padding-top: var(--space-4);
        border-top: 1px solid var(--color-hairline);
      }
      .schedule-top-actions {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-top: var(--space-5);
      }
      .schedule-summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(18rem, 1fr));
        gap: var(--space-4);
      }
      .schedule-summary-card {
        border: none;
        border-radius: var(--r-card);
        background: var(--color-surface);
        padding: var(--space-5) var(--space-6);
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
      }
      .schedule-summary-card strong {
        display: block;
        font-family: "Outfit", sans-serif;
        font-size: var(--type-kicker);
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-ink-faint);
      }
      .schedule-summary-card small {
        color: var(--color-ink-faint);
        font-size: var(--type-body-sm);
        font-weight: 300;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      {% include "_top_tabs.html" %}

      <main class="main-content">
        <header class="page-header animate-in">
          <h2>Schedule</h2>
          <p>Only the Jobs, Scoring, and Resume agents can run unattended in the background.</p>
          <div class="schedule-top-actions">
            <button type="button" id="schedule-install" class="btn-accent">Install Background Scheduler</button>
            <button type="button" id="schedule-uninstall" class="btn-sm">Uninstall Background Scheduler</button>
            <button type="button" id="schedule-run-due" class="btn-sm">Run Due Checks Now</button>
            <button type="button" id="schedule-save" class="btn-primary">Save Schedule</button>
          </div>
        </header>

        <section class="section animate-in">
          <div class="schedule-summary-grid">
            <div class="schedule-summary-card">
              <strong>Background Item</strong>
              <div id="schedule-launch-agent-status">Checking scheduler background item…</div>
              <small id="schedule-launch-agent-path"></small>
            </div>
            <div class="schedule-summary-card">
              <strong>Secret Helper</strong>
              <div id="schedule-helper-status">Checking helper…</div>
              <small id="schedule-helper-detail"></small>
            </div>
          </div>
        </section>

        <section class="section animate-in">
          <div id="schedule-output" class="status-box" hidden></div>
        </section>

        <section class="section animate-in">
          <div id="schedule-grid" class="schedule-grid"></div>
        </section>
      </main>
    </div>

    <script src="/static/schedule.js?v=20260428-card-shuffle-v2"></script>
    {% include "_motion_libs.html" %}
  </body>
</html>
