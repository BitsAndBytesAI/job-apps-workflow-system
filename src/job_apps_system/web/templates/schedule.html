<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schedule - AI Job Agents</title>
    <script>(function(){var m=document.cookie.match(/(?:^|; )app-font-size=(\d+)/);if(m)document.documentElement.style.fontSize=m[1]+'px'})();</script>
    <link rel="stylesheet" href="/static/app.css?v=20260423-scheduler" />
    <style>
      .schedule-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(20rem, 1fr));
        gap: 1rem;
      }
      .schedule-card {
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.96);
        padding: 1rem;
        box-shadow: 0 16px 48px rgba(15, 23, 42, 0.08);
      }
      .schedule-card h3 {
        margin: 0 0 0.35rem;
      }
      .schedule-meta {
        color: var(--text-muted);
        font-size: 0.92rem;
        margin-bottom: 0.9rem;
      }
      .schedule-days {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0.85rem 0;
      }
      .schedule-day {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.4rem 0.55rem;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.08);
        font-size: 0.9rem;
      }
      .schedule-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 0.9rem;
      }
      .schedule-top-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1rem;
      }
      .schedule-summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr));
        gap: 1rem;
      }
      .schedule-summary-card {
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.96);
        padding: 1rem;
      }
      .schedule-summary-card strong {
        display: block;
        margin-bottom: 0.35rem;
      }
      .schedule-summary-card small {
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <h1>AI Job Agents</h1>
        </div>

        <nav class="sidebar-nav">
          <div class="sidebar-nav-label">Workspace</div>
          <a href="/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="1.5" y="1.5" width="5" height="5" rx="1" />
              <rect x="9.5" y="1.5" width="5" height="5" rx="1" />
              <rect x="1.5" y="9.5" width="5" height="5" rx="1" />
              <rect x="9.5" y="9.5" width="5" height="5" rx="1" />
            </svg>
            Dashboard
          </a>
          <a href="/jobs/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 2.5h5l2 3v7a1 1 0 0 1-1 1h-7a1 1 0 0 1-1-1v-7l2-3z" />
              <path d="M3.5 5.5h9" />
            </svg>
            Applications
          </a>
          <a href="/jobs/all/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2.5 3.5h11v9h-11z" />
              <path d="M5 6.5h6M5 9h6M5 11.5h4" />
            </svg>
            All Jobs
          </a>
          <a href="/communications/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3.5h12v9H2z" />
              <path d="M2 4l6 4 6-4" />
            </svg>
            Communications
          </a>
          <a href="/schedule/" class="active">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2.5 3.5h11v9h-11z" />
              <path d="M5.5 3.5v-2M10.5 3.5v-2M2.5 7h11" />
            </svg>
            Schedule
          </a>

          <div class="sidebar-nav-label">System</div>
          <a href="/setup/">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="8" r="2.5" />
              <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4" />
            </svg>
            Setup
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="env-badge">
            <span class="env-dot"></span>
            scheduler
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="page-header animate-in">
          <h2>Schedule</h2>
          <p>Only the Jobs, Scoring, and Resume agents can run unattended in the background.</p>
          <div class="schedule-top-actions">
            <button type="button" id="schedule-install" class="btn-accent">Install Background Scheduler</button>
            <button type="button" id="schedule-uninstall" class="btn-sm">Uninstall Background Scheduler</button>
            <button type="button" id="schedule-run-due" class="btn-sm">Run Due Checks Now</button>
            <button type="button" id="schedule-save" class="btn-primary">Save Schedule</button>
          </div>
        </header>

        <section class="section animate-in">
          <div class="schedule-summary-grid">
            <div class="schedule-summary-card">
              <strong>Background Item</strong>
              <div id="schedule-launch-agent-status">Checking scheduler background item…</div>
              <small id="schedule-launch-agent-path"></small>
            </div>
            <div class="schedule-summary-card">
              <strong>Secret Helper</strong>
              <div id="schedule-helper-status">Checking helper…</div>
              <small id="schedule-helper-detail"></small>
            </div>
          </div>
        </section>

        <section class="section animate-in">
          <div id="schedule-output" class="status-box" hidden></div>
        </section>

        <section class="section animate-in">
          <div id="schedule-grid" class="schedule-grid"></div>
        </section>
      </main>
    </div>

    <script src="/static/schedule.js?v=20260423-scheduler"></script>
  </body>
</html>
